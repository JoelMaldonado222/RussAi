\<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Tap & Pour — The Hangry Bison</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0B0A08">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Russ AI">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Pinyon+Script&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #FBF8F0;
            --panel: #FFFFFF;
            --panel2: #F2EBDC;
            --gold: #A17E36;
            --gold-2: #7A5E20;
            --gold-dim: #C7B488;
            --cream: #1A160F;
            --cream-dim: #58513F;
            --cream-faint: #8A8270;
            --line: #EAE1CE;
            --line-2: #DBD0B7;
            --radius: 14px;
            --emerald: #12B074;
            --emerald-2: #0B7C50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: var(--ink);
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ---- Russ AI login gate ---- */
        .gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .gate-card {
            width: 100%;
            max-width: 330px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 14px;
        }

        .gate-logo {
            width: 96px;
            height: 96px;
        }

        .gate-word {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        .gate-word .r {
            color: var(--emerald);
        }

        .gate-word .a {
            color: var(--emerald-2);
        }

        .gate-title {
            font-family: 'Inter';
            font-size: 13px;
            color: var(--cream-dim);
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .gate-input {
            width: 100%;
            background: var(--panel);
            border: 1.5px solid var(--line-2);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'Inter';
            font-size: 16px;
            color: var(--cream);
            outline: none;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 1px 2px rgba(60, 50, 20, 0.05);
            transition: border-color .15s;
        }

        .gate-input:focus {
            border-color: var(--emerald);
        }

        .gate-btn {
            width: 100%;
            background: var(--emerald);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Inter';
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: filter .15s;
        }

        .gate-btn:hover {
            filter: brightness(1.06);
        }

        .gate-btn:active {
            filter: brightness(0.97);
        }

        .gate-err {
            min-height: 16px;
            font-size: 12.5px;
            color: #B0392E;
            display: none;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px 14px;
            border-bottom: 1px solid var(--line);
        }

        .hmark {
            width: 40px;
            height: 40px;
            border: 1.5px solid var(--gold);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: none;
        }

        .hmark span {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 24px;
            color: var(--gold);
            line-height: 1;
        }

        .brand .the {
            font-family: 'Pinyon Script', cursive;
            font-size: 15px;
            color: var(--gold-2);
            line-height: 0.7;
            margin-bottom: 1px;
        }

        .brand .name {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: var(--cream);
            line-height: 1;
        }

        .brand .tag {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--gold);
            margin-top: 3px;
        }

        .search-wrap {
            padding: 16px 18px 6px;
            position: relative;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel);
            border: 1.5px solid var(--line-2);
            border-radius: 12px;
            padding: 0 14px;
            box-shadow: 0 1px 2px rgba(60, 50, 20, 0.05);
            transition: border-color .15s, box-shadow .15s;
        }

        .search-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 2px 10px rgba(161, 126, 54, 0.14);
        }

        .search-box svg {
            width: 19px;
            height: 19px;
            flex: none;
            stroke: var(--gold);
        }

        #q {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--cream);
            font-family: 'Inter';
            font-size: 16px;
            padding: 13px 0;
        }

        #q::placeholder {
            color: var(--cream-faint);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--cream-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            display: none;
        }

        .dropdown {
            background: var(--panel);
            border: 1px solid var(--line-2);
            border-top: none;
            border-radius: 0 0 12px 12px;
            margin-top: -3px;
            overflow: hidden;
            box-shadow: 0 8px 22px rgba(60, 50, 20, 0.08);
            display: none;
            position: relative;
            z-index: 5;
        }

        .dropdown.open {
            display: block;
        }

        .opt {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 11px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--line);
        }

        .opt:last-child {
            border-bottom: none;
        }

        .opt:hover,
        .opt.active {
            background: var(--panel2);
        }

        .opt .on {
            font-size: 14px;
            color: var(--cream);
        }

        .opt .oc {
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.5px;
        }

        .opt .op {
            font-size: 13px;
            color: var(--cream-dim);
            font-variant-numeric: tabular-nums;
        }

        .nomatch {
            padding: 14px;
            font-size: 13px;
            color: var(--cream-faint);
        }

        /* category pills */
        .cats {
            display: flex;
            gap: 8px;
            padding: 6px 18px 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cats::-webkit-scrollbar {
            display: none;
        }

        .cat {
            flex: none;
            font-family: 'Inter';
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1.5px solid var(--line-2);
            background: var(--panel);
            color: var(--cream-dim);
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
        }

        .cat:hover {
            border-color: var(--gold-dim);
        }

        .cat.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #fff;
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 6px 18px 56px;
        }

        /* rotating tip line */
        .tipline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            text-align: center;
            min-height: 20px;
            margin: 4px 0 24px;
            font-size: 12.5px;
            color: var(--cream-dim);
            line-height: 1.4;
            transition: opacity .4s ease;
        }

        .tipline .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            flex: none;
            animation: pulse 2.2s infinite;
        }

        .tipline b {
            color: var(--gold-2);
            font-weight: 600;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(161, 126, 54, 0.45);
            }

            70% {
                box-shadow: 0 0 0 7px rgba(161, 126, 54, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(161, 126, 54, 0);
            }
        }

        /* popular pours */
        .pop {
            margin-bottom: 26px;
        }

        .pop-label {
            font-size: 10px;
            letter-spacing: 2.5px;
            font-weight: 600;
            color: var(--cream-faint);
            text-align: center;
            margin-bottom: 13px;
        }

        .pop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
        }

        .qbtl {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 12px 13px;
            background: var(--panel);
            border: 1px solid var(--line-2);
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 1px 2px rgba(60, 50, 20, 0.04);
            transition: transform .12s, box-shadow .12s, border-color .12s;
        }

        .qbtl:hover {
            transform: translateY(-2px);
            border-color: var(--gold-dim);
            box-shadow: 0 6px 16px rgba(60, 50, 20, 0.09);
        }

        .qbtl:active {
            transform: translateY(0);
        }

        .qbtl .qn {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--cream);
            line-height: 1.1;
        }

        .qbtl .qp {
            font-size: 12px;
            color: var(--gold-2);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 7px;
            padding: 6px 30px 0;
        }

        .hint svg {
            width: 84px;
            height: auto;
            opacity: 0.16;
        }

        .hint .et {
            font-family: 'Zilla Slab', serif;
            font-weight: 600;
            font-size: 15px;
            color: var(--cream-dim);
        }

        .hint .es {
            font-size: 12px;
            color: var(--cream-faint);
            max-width: 250px;
            line-height: 1.5;
        }

        .result {
            padding: 16px 18px 26px;
            display: none;
        }

        .loading {
            padding: 46px 18px;
            text-align: center;
            color: var(--cream-dim);
            font-size: 13.5px;
        }

        .loading .spin {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 3px solid var(--line-2);
            border-top-color: var(--gold);
            margin: 0 auto 14px;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .err {
            padding: 40px 20px;
            text-align: center;
            color: var(--cream-dim);
            font-size: 13.5px;
            line-height: 1.6;
        }

        .err b {
            color: var(--gold-2);
        }

        .eyebrow {
            font-size: 10px;
            letter-spacing: 2.5px;
            font-weight: 600;
            margin-bottom: 9px;
        }

        .eyebrow.g {
            color: var(--gold-2);
        }

        .eyebrow.d {
            color: var(--cream-faint);
        }

        .eyebrow.moreopts {
            margin-top: 22px;
        }

        .ordered {
            background: var(--panel);
            border: 1px solid var(--line-2);
            border-top: 3px solid var(--gold);
            border-radius: var(--radius);
            padding: 15px 16px;
            margin-bottom: 22px;
            box-shadow: 0 2px 4px rgba(60, 50, 20, 0.04), 0 10px 26px rgba(60, 50, 20, 0.05);
        }

        .ord-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .ord-name {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 24px;
            line-height: 1;
            color: var(--cream);
        }

        .ord-price {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--gold-2);
            white-space: nowrap;
        }

        .sub {
            font-size: 11px;
            letter-spacing: 0.8px;
            color: var(--cream-faint);
            font-weight: 500;
            margin: 7px 0 11px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            font-size: 11px;
            padding: 4px 9px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .chip.base {
            background: var(--panel2);
            color: var(--cream-dim);
            border: 1px solid var(--line-2);
        }

        .chip.share {
            background: var(--gold);
            color: #fff;
            font-weight: 600;
        }

        .chip.dark {
            background: var(--panel2);
            color: var(--cream-dim);
            border: 1px solid var(--line-2);
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 11px;
        }

        .pill {
            font-size: 10px;
            letter-spacing: 0.5px;
            padding: 4px 9px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .pill.batch {
            background: rgba(161, 126, 54, 0.14);
            color: var(--gold-2);
            border: 1px solid var(--gold-dim);
        }

        .pill.mash {
            background: var(--panel2);
            color: var(--cream-dim);
            border: 1px solid var(--line-2);
        }

        .pill.age {
            background: var(--panel2);
            color: var(--cream-dim);
            border: 1px solid var(--line-2);
        }

        .pill.finish {
            background: rgba(161, 126, 54, 0.10);
            color: var(--gold-2);
            border: 1px solid var(--gold-dim);
        }

        .picks {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pick {
            background: var(--panel);
            border: 1px solid var(--line-2);
            border-radius: var(--radius);
            padding: 15px 16px;
            position: relative;
            box-shadow: 0 2px 4px rgba(60, 50, 20, 0.04), 0 8px 20px rgba(60, 50, 20, 0.04);
        }

        .pick.top {
            border: 2px solid var(--gold);
        }

        /* compact "more options" cards — lighter than the two scripted heroes */
        .pick.compact {
            padding: 12px 14px;
            box-shadow: 0 1px 2px rgba(60, 50, 20, 0.04);
        }

        .pick.compact .pk-name {
            font-size: 16px;
        }

        .pick.compact .pk-price {
            font-size: 17px;
        }

        .pick.compact .proofrow {
            margin: 8px 0;
        }

        .pick.compact .reason {
            font-size: 12px;
            margin-top: 8px;
        }

        .toptag {
            position: absolute;
            top: -9px;
            left: 14px;
            background: var(--gold);
            color: #fff;
            font-size: 9px;
            letter-spacing: 1.5px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 5px;
        }

        .pk-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .pk-name {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 19px;
            line-height: 1.05;
            color: var(--cream);
        }

        .pk-price {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--gold-2);
            white-space: nowrap;
        }

        .proofrow {
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 10px 0 10px;
        }

        .proofrow .lbl {
            font-size: 9px;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--cream-faint);
        }

        .proofrow .v {
            font-size: 13px;
            font-weight: 600;
            color: var(--cream);
            font-variant-numeric: tabular-nums;
        }

        .proofrow .arw {
            stroke: var(--gold);
            width: 14px;
            height: 14px;
        }

        .proofrow .note {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--panel2);
            color: var(--gold-2);
            border: 1px solid var(--line-2);
            margin-left: 2px;
        }

        .reason {
            font-size: 12.5px;
            color: var(--cream-dim);
            line-height: 1.5;
            margin-top: 11px;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px 18px 26px;
            border-top: 1px solid var(--line);
        }

        footer .fl {
            font-family: 'Zilla Slab', serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1.5px;
            color: var(--gold-2);
        }

        .powered {
            margin-top: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pw-by {
            font-size: 9px;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--cream-faint);
        }

        .pw-mark {
            font-family: 'Zilla Slab', serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            background: linear-gradient(100deg, var(--gold-2) 0%, var(--gold) 28%, #EBD199 50%, var(--gold) 72%, var(--gold-2) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: shine 3.6s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @media (prefers-reduced-motion:no-preference) {

            .result,
            .ordered,
            .pick {
                animation: rise .28s ease both;
            }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @media (prefers-reduced-motion:reduce) {

            .pw-mark,
            .tipline .dot {
                animation: none;
            }

            .tipline {
                transition: none;
            }

            .qbtl {
                transition: none;
            }
        }
    </style>
</head>

<body>

    <!-- Russ AI login gate -->
    <div class="gate" id="gate">
        <div class="gate-card">
            <svg class="gate-logo" viewBox="0 0 140 140" aria-hidden="true">
                <rect x="10" y="10" width="120" height="120" rx="30" fill="#0B0A08" />
                <circle cx="70" cy="70" r="42" fill="none" stroke="#12B074" stroke-width="2.5" />
                <text x="56" y="88" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="50"
                    fill="#12B074">R</text>
                <text x="84" y="88" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="50"
                    fill="#0B7C50">A</text>
            </svg>
            <div class="gate-word"><span class="r">RUSS</span> <span class="a">AI</span></div>
            <div class="gate-title">Enter your access code</div>
            <input id="gate-input" class="gate-input" type="password" placeholder="Access code" autocomplete="off"
                spellcheck="false" inputmode="text">
            <button id="gate-btn" class="gate-btn">Unlock</button>
            <div class="gate-err" id="gate-err"></div>
        </div>
    </div>

    <div class="app">

        <header>
            <div class="hmark"><span>H</span></div>
            <div class="brand">
                <div class="the">The</div>
                <div class="name">HANGRY BISON</div>
                <div class="tag">BOURBON · BURGERS · BEER</div>
            </div>
        </header>

        <div class="search-wrap">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7" />
                    <path d="M21 21l-4.3-4.3" />
                </svg>
                <input id="q" type="text" placeholder="Search the bottle they ordered…" autocomplete="off"
                    spellcheck="false">
                <button class="clear-btn" id="clear" aria-label="Clear">&times;</button>
            </div>
            <div class="dropdown" id="dd"></div>
        </div>

        <div class="cats" id="cats"></div>

        <div class="empty" id="empty">
            <div class="tipline" id="tipline"></div>
            <div class="pop">
                <div class="pop-label">POPULAR POURS</div>
                <div class="pop-grid" id="popGrid"></div>
            </div>
            <div class="hint">
                <svg viewBox="0 0 200 128" aria-hidden="true">
                    <path fill="var(--gold)"
                        d="M20,92 C14,92 12,86 18,84 C24,82 30,82 34,80 C34,70 40,62 50,60 C52,54 58,52 60,56 C60,50 66,46 72,48 C76,38 86,34 94,40 C100,30 114,30 122,36 C134,34 150,40 160,46 C162,40 168,38 170,44 C170,52 164,56 158,58 C164,66 166,76 162,86 L158,104 C158,110 150,110 150,104 L150,84 C140,88 128,88 120,86 L118,104 C118,110 110,110 110,104 L110,84 C98,82 84,78 74,72 L72,104 C72,110 64,110 64,104 L64,76 C56,76 48,80 44,86 L42,104 C42,110 34,110 34,104 L34,84 C30,88 24,92 20,92 Z" />
                </svg>
                <div class="et">Pour Assist</div>
                <div class="es">Type what the guest ordered, or tap a bottle above.</div>
            </div>
        </div>

        <div class="result" id="result"></div>

        <footer>
            <div class="fl">COME HANGRY. LEAVE HAPPY.</div>
            <div class="powered">
                <span class="pw-by">POWERED BY</span>
                <span class="pw-mark">RUSS&nbsp;AI</span>
            </div>
        </footer>
    </div>

    <script>
        /* ============================================================
           LIVE ENGINE WIRING
           Same-origin calls (page + API both served by Spring Boot):
             GET  /api/spirits              -> all bottles (loaded once, cached)
             POST /api/recommend/script     -> real engine picks for a chosen bottle
           Every API call carries the device's access code as X-Access-Key,
           which the backend AccessKeyFilter checks once ACCESS_KEY is set.
           ============================================================ */

        const API_SPIRITS = '/api/spirits';
        const API_SCRIPT = '/api/recommend/script';
        const CACHE_KEY = 'russai_catalog_v1';
        const ACCESS_STORAGE = 'russai_access_key';

        let CATALOG = [];   // filled from /api/spirits on load

        /* ---- access code helpers ---- */
        function getKey() { try { return localStorage.getItem(ACCESS_STORAGE) || ''; } catch (_) { return ''; } }
        function setKey(k) { try { localStorage.setItem(ACCESS_STORAGE, k); } catch (_) { } }
        function clearKey() { try { localStorage.removeItem(ACCESS_STORAGE); } catch (_) { } }
        function authHeaders(extra) {
            const h = Object.assign({}, extra || {});
            const k = getKey();
            if (k) h['X-Access-Key'] = k;
            return h;
        }

        /* ---- login gate ---- */
        function showGate(msg) {
            document.getElementById('gate').style.display = 'flex';
            const e = document.getElementById('gate-err');
            if (msg) { e.textContent = msg; e.style.display = 'block'; }
            else { e.textContent = ''; e.style.display = 'none'; }
            const inp = document.getElementById('gate-input');
            inp.value = '';
            setTimeout(() => inp.focus(), 50);
        }
        function hideGate() { document.getElementById('gate').style.display = 'none'; }
        function lockOut() { clearKey(); showGate("That code didn't work. Try again."); }

        function submitGate() {
            const v = document.getElementById('gate-input').value.trim();
            if (!v) { showGate('Enter your access code.'); return; }
            setKey(v);
            hideGate();
            boot();
        }

        /* ---- helpers to map the real API fields into what the UI uses ---- */
        function splitTags(t) { return (t || "").split(",").map(s => s.trim()).filter(Boolean); }

        function mashFamilyOf(mb) {
            if (!mb) return "";
            // API sends e.g. "Wheated — 70% Corn, ..." -> take the family word before the dash
            const head = mb.split(/\s[—–-]\s/)[0];
            return (head || mb).trim();
        }

        function fmtPrice(p) {
            if (p == null) return "";
            const n = +p;
            return Number.isInteger(n) ? String(n) : n.toFixed(2);
        }

        function fmtProof(p) {
            if (p == null) return "";
            const n = +p;
            return Number.isInteger(n) ? String(n) : String(n);
        }

        // one bottle from GET /api/spirits -> internal shape
        function fromApiSpirit(a) {
            return {
                name: a.name,
                distillery: a.distillery || "",
                mashBill: a.mashBill || "",
                mashFamily: mashFamilyOf(a.mashBill),
                flavor: splitTags(a.flavorTags),
                price: a.pricePour,
                proof: a.proof,
                age: a.ageStatement,
                batch: a.batchType,
                finish: a.finish,
                cat: a.category || ""
            };
        }

        // one pick from topPicks[] / otherOptions[] -> internal shape
        function fromApiPick(p) {
            return {
                name: p.name,
                distillery: p.distillery || "",
                mashBill: p.mashBill || "",
                mashFamily: mashFamilyOf(p.mashBill),
                flavor: splitTags(p.flavorTags),
                price: p.pricePour,
                proof: p.proof,
                age: p.ageStatement,
                batch: p.batchType,
                finish: p.finish,
                script: p.script || "",
                reason: p.reason || "",
                comparisonOnly: !!p.comparisonOnly,
                aspirational: !!p.aspirational
            };
        }

        /* ---- fallback reason line (only used if the engine sends no text) ---- */
        function reasonFor(o, x) {
            const p = x.s, step = x.step;
            const money = step > 0 ? ` +$${step}` : (step < 0 ? ` $${Math.abs(step)} less` : ` same price`);
            if (x.shared.length >= 3) return `Closest flavor twin — shares ${x.shared.length} notes.${money}`;
            if (p.proof - o.proof >= 18) return `Same lane with a bigger punch at ${fmtProof(p.proof)} proof.${money}`;
            if (p.mashFamily === o.mashFamily && p.mashFamily && p.mashFamily !== "Standard") return `Same ${p.mashFamily.toLowerCase()} style, a clear step up.${money}`;
            if (p.age && (!o.age || p.age > o.age)) return `Aged ${p.age} years for more depth.${money}`;
            return `Similar profile, worth the pour.${money}`;
        }

        function chipHTML(pick, orderedTags) {
            const oset = orderedTags.map(t => t.toLowerCase());
            return pick.flavor.map(f => {
                const shared = oset.includes(f.toLowerCase());
                return `<span class="chip ${shared ? 'share' : 'base'}">${f}</span>`;
            }).join("");
        }

        function metaHTML(s) {
            let h = "";
            if (s.batch) h += `<span class="pill batch">${s.batch}</span>`;
            if (s.mashFamily) h += `<span class="pill mash">${s.mashFamily}</span>`;
            if (s.age) h += `<span class="pill age">${s.age} yr</span>`;
            if (s.finish && s.finish !== "None") h += `<span class="pill finish">${s.finish}</span>`;
            return h;
        }

        const arw = `<svg class="arw" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;

        // mode: 'top' (scripted hero + tag), 'mid' (scripted hero), 'compact' (more options)
        function pickHTML(o, p, mode) {
            const shared = p.flavor.filter(f => o.flavor.map(t => t.toLowerCase()).includes(f.toLowerCase()));
            const step = (p.price != null && o.price != null) ? +(p.price - o.price).toFixed(0) : 0;
            const reasonText = p.script || p.reason || reasonFor(o, { s: p, shared, step });
            const note = p.proof > o.proof ? "bigger punch" : (p.proof < o.proof ? "smoother" : "even proof");
            const cls = mode === 'top' ? 'pick top' : (mode === 'compact' ? 'pick compact' : 'pick');
            return `<div class="${cls}">
    ${mode === 'top' ? '<div class="toptag">TOP PICK</div>' : ''}
    <div class="pk-top"><div class="pk-name">${p.name}</div><div class="pk-price">$${fmtPrice(p.price)}</div></div>
    <div class="proofrow"><span class="lbl">PROOF</span><span class="v">${fmtProof(o.proof)}</span>${arw}<span class="v">${fmtProof(p.proof)}</span><span class="note">${note}</span></div>
    <div class="chips">${chipHTML(p, o.flavor)}</div>
    <div class="meta">${metaHTML(p)}</div>
    <div class="reason">${reasonText}</div>
  </div>`;
        }

        function renderResult(data) {
            // ordered bottle — script endpoint omits distillery, so look it up from the cached catalog
            const base = CATALOG.find(x => x.name === data.orderedSpirit) || {};
            const o = {
                name: data.orderedSpirit,
                distillery: base.distillery || "",
                flavor: splitTags(data.orderedSpiritFlavorTags),
                mashBill: data.orderedSpiritMashBill,
                mashFamily: mashFamilyOf(data.orderedSpiritMashBill),
                price: data.orderedSpiritPricePour,
                proof: data.orderedSpiritProof,
                age: data.orderedSpiritAgeStatement,
                batch: data.orderedSpiritBatchType,
                finish: data.orderedSpiritFinish
            };

            // two scripted heroes from topPicks; the rest become compact "more options"
            const heroesRaw = (data.topPicks || []).map(fromApiPick);
            const othersRaw = Array.isArray(data.otherOptions) ? data.otherOptions.map(fromApiPick) : [];

            let heroes = heroesRaw.slice(0, 2);
            const used = new Set(heroes.map(h => h.name));
            // if the engine returned fewer than 2 scripted picks, top up from the others
            if (heroes.length < 2) {
                for (const op of othersRaw) {
                    if (heroes.length >= 2) break;
                    if (!used.has(op.name)) { heroes.push(op); used.add(op.name); }
                }
            }
            const compact = othersRaw.filter(op => !used.has(op.name)).slice(0, 3);

            const subLine = `${fmtProof(o.proof)} PROOF${o.distillery ? ' · ' + o.distillery.toUpperCase() : ''}`;

            let picksBlock;
            if (heroes.length) {
                picksBlock = `<div class="eyebrow g">POUR THEM UP</div>
      <div class="picks">${heroes.map((p, i) => pickHTML(o, p, i === 0 ? 'top' : 'mid')).join("")}</div>`;
                if (compact.length) {
                    picksBlock += `<div class="eyebrow d moreopts">MORE OPTIONS</div>
      <div class="picks">${compact.map(p => pickHTML(o, p, 'compact')).join("")}</div>`;
                }
            } else {
                picksBlock = `<div class="err">No upsell found for this one.</div>`;
            }

            const html = `
    <div class="eyebrow d">GUEST ORDERED</div>
    <div class="ordered">
      <div class="ord-top"><div class="ord-name">${o.name}</div><div class="ord-price">$${fmtPrice(o.price)}</div></div>
      <div class="sub">${subLine}</div>
      <div class="chips">${o.flavor.map(f => `<span class="chip base">${f}</span>`).join("")}</div>
      <div class="meta">${metaHTML(o)}</div>
    </div>
    ${picksBlock}
  `;
            const r = document.getElementById('result');
            r.innerHTML = html;
            r.style.display = 'block';
            document.getElementById('empty').style.display = 'none';
        }

        /* ---- DOM refs ---- */
        const q = document.getElementById('q');
        const dd = document.getElementById('dd');
        const clearBtn = document.getElementById('clear');
        let active = -1, current = [];

        function norm(s) { return s.toLowerCase().replace(/[''`.\-]/g, "").replace(/\s+/g, " ").trim(); }

        /* ---- category state ---- */
        let activeCat = "All";
        function catFilter(list) { return activeCat === "All" ? list : list.filter(s => s.cat === activeCat); }

        function buildCats() {
            const order = ["Bourbon", "Rye", "Tennessee Whiskey", "Scotch", "Tequila"];
            const present = [...new Set(CATALOG.map(s => s.cat).filter(Boolean))];
            const ordered = order.filter(c => present.includes(c));
            const rest = present.filter(c => !order.includes(c)).sort();
            const cats = ["All", ...ordered, ...rest];
            const wrap = document.getElementById('cats');
            wrap.innerHTML = cats.map(c => `<button class="cat${c === activeCat ? ' active' : ''}" data-cat="${c}">${c}</button>`).join("");
            [...wrap.querySelectorAll('.cat')].forEach(el => {
                el.addEventListener('click', () => {
                    activeCat = el.dataset.cat;
                    [...wrap.querySelectorAll('.cat')].forEach(b => b.classList.toggle('active', b.dataset.cat === activeCat));
                    renderPopular();
                    if (q.value) search(q.value);
                });
            });
        }

        /* ---- popular pours ---- */
        const POPULAR = ["Buffalo Trace", "Eagle Rare Single Barrel", "Blanton's Single Barrel", "Maker's Mark", "Woodford Reserve", "Jack Daniel's Single Barrel", "Wild Turkey 101", "Knob Creek"];
        function renderPopular() {
            const src = catFilter(CATALOG);
            let items = POPULAR.map(n => src.find(s => s.name === n)).filter(Boolean);
            if (items.length < 4) {
                const have = new Set(items.map(s => s.name));
                for (const s of src) { if (!have.has(s.name)) { items.push(s); have.add(s.name); } if (items.length >= 6) break; }
            }
            items = items.slice(0, 6);
            const grid = document.getElementById('popGrid');
            grid.innerHTML = items.map((s, i) => `<button class="qbtl" data-i="${i}"><span class="qn">${s.name}</span><span class="qp">$${fmtPrice(s.price)}</span></button>`).join("");
            [...grid.querySelectorAll('.qbtl')].forEach(el => {
                el.addEventListener('click', () => choose(items[+el.dataset.i]));
            });
        }

        /* ---- rotating tip line ---- */
        const TIPS = [
            `<b>Barrel proof</b> pours hit harder — steer the punch-chasers there.`,
            `<b>Wheated</b> bottles drink smooth and sweet — an easy yes for softer palates.`,
            `A <b>$5–8 step up</b> is the easiest upsell. Lead with the closest flavor twin.`,
            `Don't know a bottle? Ring it in to see its <b>full profile</b> instantly.`,
            `<b>{N} bottles</b> loaded and ready to pour.`
        ];
        let ti = 0;
        let tipTimer = null;
        const tipEl = document.getElementById('tipline');
        function showTip(html) { tipEl.innerHTML = `<span class="dot"></span><span>${html.replace('{N}', CATALOG.length)}</span>`; }
        function rotateTip() {
            tipEl.style.opacity = 0;
            setTimeout(() => { showTip(TIPS[ti]); tipEl.style.opacity = 1; ti = (ti + 1) % TIPS.length; }, 400);
        }

        /* ---- search (respects active category) ---- */
        const ALIASES = [["pappy", "van winkle"], ["eht", "eh taylor"], ["ogd", "old grand dad"], ["er", "eagle rare"]];
        function aliasTargets(t) {
            if (t.length < 2) return [];
            return ALIASES.filter(([nick]) => nick.startsWith(t) || nick.includes(t)).map(([, tgt]) => tgt);
        }
        function search(term) {
            const t = norm(term);
            if (!t) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
            const tgts = aliasTargets(t);
            const res = catFilter(CATALOG).filter(s => {
                const n = norm(s.name);
                if (n.includes(t) || norm(s.distillery).includes(t)) return true;
                return tgts.some(tg => n.includes(tg));
            }).slice(0, 8);
            current = res; active = -1;
            if (!res.length) { dd.innerHTML = `<div class="nomatch">No bottle by that name${activeCat === "All" ? "" : " in " + activeCat}.</div>`; dd.classList.add('open'); return; }
            dd.innerHTML = res.map((s, i) => `<div class="opt" data-i="${i}"><span class="on">${s.name}</span><span class="oc">${s.cat}</span><span class="op">$${fmtPrice(s.price)}</span></div>`).join("");
            dd.classList.add('open');
            [...dd.querySelectorAll('.opt')].forEach(el => {
                el.addEventListener('click', () => choose(res[+el.dataset.i]));
            });
        }

        /* ---- choose a bottle -> call the live engine ---- */
        async function choose(s) {
            q.value = s.name;
            dd.classList.remove('open');
            document.getElementById('empty').style.display = 'none';
            const r = document.getElementById('result');
            r.style.display = 'block';
            r.innerHTML = `<div class="loading"><div class="spin"></div>Finding pours…</div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            try {
                const resp = await fetch(API_SCRIPT, {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({ spiritName: s.name })
                });
                if (resp.status === 401) { lockOut(); return; }
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                renderResult(data);
            } catch (e) {
                r.innerHTML = `<div class="err">Couldn't load picks for <b>${s.name}</b>.<br>Make sure the app is running, then try again.<br><span style="font-size:11px;color:var(--cream-faint)">${e.message}</span></div>`;
            }
        }

        q.addEventListener('input', e => { clearBtn.style.display = e.target.value ? 'block' : 'none'; search(e.target.value); });
        q.addEventListener('keydown', e => {
            const opts = dd.querySelectorAll('.opt');
            if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, opts.length - 1); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); }
            else if (e.key === 'Enter') { if (active >= 0 && current[active]) choose(current[active]); else if (current.length === 1) choose(current[0]); return; }
            else return;
            opts.forEach((o, i) => o.classList.toggle('active', i === active));
        });
        clearBtn.addEventListener('click', () => { q.value = ''; clearBtn.style.display = 'none'; dd.classList.remove('open'); document.getElementById('result').style.display = 'none'; document.getElementById('empty').style.display = 'flex'; q.focus(); });
        document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) dd.classList.remove('open'); });

        // gate controls
        document.getElementById('gate-btn').addEventListener('click', submitGate);
        document.getElementById('gate-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitGate(); });

        /* ---- load the real catalog (with a cached fallback for flaky wifi) ----
           returns true if the app can proceed, false if it locked out / hard-failed */
        async function loadCatalog() {
            try {
                const resp = await fetch(API_SPIRITS, { headers: authHeaders() });
                if (resp.status === 401) { lockOut(); return false; }
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const raw = await resp.json();
                CATALOG = raw.map(fromApiSpirit);
                try { localStorage.setItem(CACHE_KEY, JSON.stringify(CATALOG)); } catch (_) { }
                return true;
            } catch (e) {
                try {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (cached) CATALOG = JSON.parse(cached);
                } catch (_) { }
                if (CATALOG.length) return true;
                document.getElementById('empty').innerHTML =
                    `<div class="err">Couldn't reach the bottle list.<br>Make sure the app is running, then reload.<br><span style="font-size:11px;color:var(--cream-faint)">${e.message}</span></div>`;
                return false;
            }
        }

        async function boot() {
            const ok = await loadCatalog();
            if (!ok) return;
            buildCats();
            renderPopular();
            showTip(TIPS[0]); ti = 1;
            if (!tipTimer) tipTimer = setInterval(rotateTip, 12000);
            q.focus();
        }

        window.addEventListener('load', () => {
            if (getKey()) { hideGate(); boot(); }
            else { showGate(); }
        });
    </script>
</body>
