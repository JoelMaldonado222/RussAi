# Database
# Falls back to local Postgres values if these environment variables aren't
# set, so this file works unchanged on your laptop. On Railway, these will
# be set in the dashboard to reference the Postgres service's own variables
# (e.g. jdbc:postgresql://${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}),
# so the exact same compiled code connects to a completely different
# database with zero code changes.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/russai_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:maldo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# App
spring.application.name=russai

# Server port — Railway assigns its own port at runtime via the PORT
# environment variable. Falls back to 8080 locally, same as always.
server.port=${PORT:8080}